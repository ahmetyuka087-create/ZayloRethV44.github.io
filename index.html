<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZayloRethV44 | Global Veri Deposu</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #020202; 
            color: #00ff33; 
            font-family: 'Courier New', Courier, monospace; 
            padding: 20px 15px;
            min-height: 450vh;
            border: 4px solid #00ff33;
            box-shadow: inset 0 0 30px #00ff33;
        }
        #matrix {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; opacity: 0.08; pointer-events: none;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }
        h1 { text-align: center; font-size: 2.2em; text-shadow: 0 0 15px #00ff33; margin-bottom: 20px; }
        .section-title {
            text-align: left; font-size: 1.1em; margin: 25px 0 10px 0;
            padding-bottom: 5px; border-bottom: 1px solid #00ff33;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .db-table {
            width: 100%; background: rgba(0, 255, 51, 0.02);
            border: 1px solid #00ff33; border-collapse: collapse;
            font-size: 0.8em; margin-bottom: 15px; text-align: left;
        }
        .db-table th, .db-table td {
            padding: 8px; border: 1px solid rgba(0, 255, 51, 0.3);
        }
        .db-table th { background: rgba(0, 255, 51, 0.1); color: #fff; }
        .fake-download-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;
        }
        .db-card {
            background: #000; border: 1px dashed #00ff33; padding: 10px;
            font-size: 0.8em; text-align: left; border-radius: 4px;
        }
        .btn {
            display: block; width: 100%; padding: 12px; margin: 10px 0;
            color: #0a0a0a; background: #00ff33; text-decoration: none;
            font-weight: bold; border-radius: 4px; border: none;
            font-family: inherit; cursor: pointer; text-align: center;
            text-transform: uppercase; font-size: 0.9em;
        }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="container">
        <h1>[ ZayloRethV44 ]</h1>
        <p style="text-align:center; font-size:0.9em; color:#888;">Merkezi Ağ Veri Deposu v4.4</p>
        <div class="blink" style="text-align:center; margin:15px; color:#ff3333;">▼ ULTRA VERİ PANELİ YÜKLENDİ - AŞAĞI KAYDIRIN ▼</div>

        <div class="section-title">1. Siber Altyapı Düğümleri</div>
        <table class="db-table"><tbody id="nodes"></tbody></table>

        <div class="section-title">2. Kriptolu Veri Havuzu</div>
        <div class="fake-download-grid" id="grid1"></div>

        <div class="section-title">3. Proxy Zincir Günlükleri</div>
        <table class="db-table"><tbody id="proxies"></tbody></table>

        <div class="section-title">4. Sistem Kayıt Dosyaları</div>
        <div class="fake-download-grid" id="grid2"></div>

        <div class="section-title">5. Sızma Analiz Raporları</div>
        <table class="db-table"><tbody id="reports"></tbody></table>

        <div class="section-title">6. Ağ Güvenlik Bypass Logları</div>
        <div class="db-card" id="log-box" style="height: 200px; overflow-y: auto;"></div>

        <button class="btn" onclick="alert('Anahtarlar güncellendi!')">Güvenli Oturumu Yenile</button>
    </div>

    <script>
        // Matrix Efekti
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const alphabet = "0101XYZV44"; const fontSize = 14;
        const columns = canvas.width / fontSize;
        const rainDrops = Array(Math.floor(columns)).fill(1);
        setInterval(() => {
            ctx.fillStyle = 'rgba(2, 2, 2, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff33'; ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            }
        }, 30);

        // Döngülerle Dinamik Tablo ve Kart Yapıları
        const nodes = document.getElementById('nodes');
        for(let i=1; i<=60; i++) {
            nodes.innerHTML += `<tr><td>Düğüm #${i*13}</td><td>10.0.${i}.${Math.floor(Math.random()*254)}</td><td style="color:#00ff33">AKTİF</td></tr>`;
        }

        const grid1 = document.getElementById('grid1');
        for(let i=1; i<=50; i++) {
            grid1.innerHTML += `<div class="db-card" onclick="alert('Erişim reddedildi.')">📁 siber_arsiv_v44_${i}.dat<br><span style="color:#ff3333">[Kilitli]</span></div>`;
        }

        const proxies = document.getElementById('proxies');
        for(let i=1; i<=60; i++) {
            proxies.innerHTML += `<tr><td>Proxy-Z${i}</td><td>185.234.${i}.${Math.floor(Math.random()*254)}</td><td>GÜVENLİ</td></tr>`;
        }

        const grid2 = document.getElementById('grid2');
        for(let i=1; i<=50; i++) {
            grid2.innerHTML += `<div class="db-card">⚙️ config_sys_backup_${i}.cfg<br><span style="color:#00ff33">[Bütünlük Doğrulandı]</span></div>`;
        }

        const reports = document.getElementById('reports');
        for(let i=1; i<=60; i++) {
            reports.innerHTML += `<tr><td>Rapor-${i*7}</td><td>Sızma Testi #${Math.floor(Math.random()*9000)}</td><td style="color:#00ff33">TAMAMLANDI</td></tr>`;
        }

        const logBox = document.getElementById('log-box');
        setInterval(() => {
            let time = new Date().toLocaleTimeString();
            logBox.innerHTML += `<div>[${time}] Paket ayrıştırılıyor... Ok verisi alındı.</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }, 1500);
    </script>
    
    </body>
</html>
