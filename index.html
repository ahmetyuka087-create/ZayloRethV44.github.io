<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZayloRethV44 | Global Veri Deposu</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #020202; 
            color: #00ff33; 
            font-family: 'Courier New', Courier, monospace; 
            padding: 20px 15px;
            min-height: 600vh;
            border: 4px solid #00ff33;
            box-shadow: inset 0 0 30px #00ff33;
            overflow-x: hidden;
        }
        #matrix {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; opacity: 0.06; pointer-events: none;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }
        
        /* Hacker Yüzü ve Logo Alanı */
        .hacker-avatar {
            text-align: center;
            margin: 20px 0;
            font-size: 70px;
            text-shadow: 0 0 20px #00ff33;
            animation: pulse 2s infinite alternate;
        }
        .hacker-frame {
            border: 2px dashed #00ff33;
            padding: 15px;
            background: rgba(0, 0, 0, 0.8);
            margin-bottom: 25px;
            box-shadow: 0 0 15px rgba(0, 255, 51, 0.3);
            text-align: center;
        }
        
        h1 { text-align: center; font-size: 2.2em; text-shadow: 0 0 15px #00ff33; margin-bottom: 5px; }
        
        .section-title {
            text-align: center; font-size: 1.3em; margin: 40px 0 20px 0;
            padding: 10px; border: 1px solid #00ff33;
            background: rgba(0, 255, 51, 0.1);
            text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 10px rgba(0,255,51,0.2);
        }
        .image-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }
        @media(max-width: 600px) {
            .image-grid { grid-template-columns: 1fr; }
        }
        .img-card {
            background: #000;
            border: 1px solid #00ff33;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            box-shadow: 0 0 8px rgba(0,255,51,0.1);
        }
        .img-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border: 1px solid rgba(0,255,51,0.3);
            border-radius: 3px;
            filter: hue-rotate(55deg) brightness(0.85) contrast(1.1);
        }
        .img-info {
            font-size: 0.75em;
            color: #888;
            margin-top: 8px;
            text-align: left;
            line-height: 1.4;
        }
        .action-btn {
            display: block;
            width: 100%;
            padding: 7px;
            margin-top: 8px;
            background: transparent;
            border: 1px solid #00ff33;
            color: #00ff33;
            font-family: inherit;
            font-size: 0.75em;
            cursor: pointer;
            text-transform: uppercase;
        }
        .action-btn:hover {
            background: #00ff33;
            color: #000;
        }
        
        /* Canlı Terminal Akışı */
        .terminal-box {
            background: #000;
            border: 1px solid #ff3333;
            padding: 15px;
            font-size: 0.8em;
            height: 180px;
            overflow-y: auto;
            color: #ff3333;
            box-shadow: inset 0 0 10px #ff3333;
            margin-bottom: 30px;
        }
        
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        @keyframes pulse { from { transform: scale(0.95); } to { transform: scale(1.05); } }
    </style>
</head>
<body>
    <audio autoplay loop id="cyber-audio">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mp3">
    </audio>

    <canvas id="matrix"></canvas>
    <div class="container">
        
        <div class="hacker-frame">
            <div class="hacker-avatar">🥷</div>
            <h1>[ ZayloRethV44 ]</h1>
            <p style="font-size:0.9em; color:#888; margin-top:5px;">Siber Operasyonel Merkezi Terminali</p>
            <p style="font-size:0.75em; color:#ff3333; margin-top:5px;" class="blink">● ARKA PLAN SES AKTİF / VERİ AKIŞI BAŞLADI</p>
        </div>

        <div class="section-title">SİBER LOG AKIŞ SIMÜLATÖRÜ</div>
        <div class="terminal-box" id="live-terminal"></div>

        <div class="section-title">KATEGORİ A: OPERASYON MERKEZLERİ</div>
        <div class="image-grid" id="kategori-a"></div>

        <div class="section-title">KATEGORİ B: SİBER SİSTEMLER VE DONANIMLAR</div>
        <div class="image-grid" id="kategori-b"></div>

        <div class="section-title">KATEGORİ C: KOD VE VERİ TABANI GÖRÜNTÜLERİ</div>
        <div class="image-grid" id="kategori-c"></div>

        <p style="text-align: center; color: #555; font-size: 0.8em; margin: 50px 0;">ZayloRethV44 Korunmalı Ağ Sonu © 2026</p>
    </div>

    <script>
        // Matrix Yağmuru
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const alphabet = "0101XYZV44"; const fontSize = 14;
        const columns = canvas.width / fontSize;
        const rainDrops = Array(Math.floor(columns)).fill(1);
        setInterval(() => {
            ctx.fillStyle = 'rgba(2, 2, 2, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff33'; ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            }
        }, 30);

        // Tarayıcı Müzik Engelleme Kuralını Aşmak İçin Ekrana Dokunulduğunda Müziği Oynatır
        document.body.addEventListener('click', () => {
            const audio = document.getElementById('cyber-audio');
            if (audio.paused) audio.play();
        });

        // Canlı Akan Terminal Yazıları
        const terminal = document.getElementById('live-terminal');
        const siberMesajlar = [
            "[OK] Çekirdek ağ protokolleri şifrelendi.",
            "[BAĞLANTI] Gizli tünel oluşturuluyor: proxy_node_44",
            "[UYARI] İzinsiz paket algılama sistemi devre dışı bırakıldı.",
            "[BİLGİ] Veri paketleri localhost üzerinden yönlendiriliyor...",
            "[SİSTEM] siber_arsiv_v44 bütünlüğü doğrulandı.",
            "[BAŞARILI] Sızma simülasyonu raporu oluşturuldu."
        ];
        setInterval(() => {
            let rastgele = siberMesajlar[Math.floor(Math.random() * siberMesajlar.length)];
            let zaman = new Date().toLocaleTimeString();
            terminal.innerHTML += `<div>[${zaman}] ${rastgele}</div>`;
            terminal.scrollTop = terminal.scrollHeight;
        }, 1200);

        // Güvenli Buton Uyarı Penceresi
        function simüleEt(id) {
            alert("Siber Panel Mesajı:\nSimülasyon Kimliği: " + id + "\nBağlantı doğrulandı, veriler yerel modda işleniyor.");
        }

        // Kategori A
        const katA = document.getElementById('kategori-a');
        for(let i=1; i<=20; i++) {
            let seed = i * 5;
            katA.innerHTML += `
                <div class="img-card">
                    <img src="https://picsum.photos/id/${10 + seed}/400/300" alt="Siber">
                    <div class="img-info">
                        <span style="color:#00ff33;">[DÜĞÜM]:</span> node_centre_${i*4}.net<br>
                        <span style="color:#888;">[MOD]:</span> Güvenli Simülatör
                    </div>
                    <button class="action-btn" onclick="simüleEt('A-${i}')">İncelemeyi Başlat</button>
                </div>`;
        }

        // Kategori B
        const katB = document.getElementById('kategori-b');
        for(let i=1; i<=20; i++) {
            let seed = i * 3;
            katB.innerHTML += `
                <div class="img-card">
                    <img src="https://picsum.photos/id/${100 + seed}/400/300" alt="Tech">
                    <div class="img-info">
                        <span style="color:#00ff33;">[DONANIM]:</span> chip_v44_core_${i}.io<br>
                        <span style="color:#888;">[DURUM]:</span> Yerel Analiz
                    </div>
                    <button class="action-btn" onclick="simüleEt('B-${i}')">İncelemeyi Başlat</button>
                </div>`;
        }

        // Kategori C
        const katC = document.getElementById('kategori-c');
        for(let i=1; i<=20; i++) {
            let seed = i * 4;
            katC.innerHTML += `
                <div class="img-card">
                    <img src="https://picsum.photos/id/${200 + seed}/400/300" alt="Code">
                    <div class="img-info">
                        <span style="color:#00ff33;">[DOSYA]:</span> system_dump_${i}.log<br>
                        <span style="color:#888;">[AĞ]:</span> Localhost-Loop
                    </div>
                    <button class="action-btn" onclick="simüleEt('C-${i}')">İncelemeyi Başlat</button>
                </div>`;
        }
    </script>
