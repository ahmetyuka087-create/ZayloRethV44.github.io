<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZayloRethV44 | Global Veri Deposu</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #020202; 
            color: #00ff33; 
            font-family: 'Courier New', Courier, monospace; 
            padding: 20px 15px;
            min-height: 600vh;
            border: 4px solid #00ff33;
            box-shadow: inset 0 0 30px #00ff33;
        }
        #matrix {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; opacity: 0.05; pointer-events: none;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }
        h1 { text-align: center; font-size: 2.2em; text-shadow: 0 0 15px #00ff33; margin-bottom: 20px; }
        .section-title {
            text-align: center; font-size: 1.3em; margin: 40px 0 20px 0;
            padding: 10px; border: 1px solid #00ff33;
            background: rgba(0, 255, 51, 0.1);
            text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 10px rgba(0,255,51,0.2);
        }
        .image-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }
        @media(max-width: 600px) {
            .image-grid { grid-template-columns: 1fr; }
        }
        .img-card {
            background: #000;
            border: 1px solid #00ff33;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            box-shadow: 0 0 8px rgba(0,255,51,0.1);
        }
        .img-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border: 1px solid rgba(0,255,51,0.3);
            border-radius: 3px;
            filter: hue-rotate(45deg) brightness(0.9);
        }
        .img-info {
            font-size: 0.75em;
            color: #888;
            margin-top: 8px;
            text-align: left;
            line-height: 1.4;
        }
        .action-btn {
            display: block;
            width: 100%;
            padding: 6px;
            margin-top: 8px;
            background: transparent;
            border: 1px solid #00ff33;
            color: #00ff33;
            font-family: inherit;
            font-size: 0.75em;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .action-btn:hover {
            background: #00ff33;
            color: #000;
        }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="container">
        <h1>[ ZayloRethV44 ]</h1>
        <p style="text-align:center; font-size:0.9em; color:#888;">Görsel Veri ve Simülasyon Paneli v4.4</p>
        <div class="blink" style="text-align:center; margin:15px; color:#ff3333; font-weight:bold;">▼ 60+ SİBER AKTİVİTE YÜKLENDİ - AŞAĞI KAYDIRIN ▼</div>

        <div class="section-title">KATEGORİ A: SİBER OPERASYON MERKEZLERİ</div>
        <div class="image-grid" id="kategori-a"></div>

        <div class="section-title">KATEGORİ B: KRİPTOLU AĞ KARTLARI VE SİSTEMLER</div>
        <div class="image-grid" id="kategori-b"></div>

        <div class="section-title">KATEGORİ C: TERMİNAL VE KOD AKIŞ EKRANLARI</div>
        <div class="image-grid" id="kategori-c"></div>

        <p style="text-align: center; color: #555; font-size: 0.8em; margin: 50px 0;">ZayloRethV44 Veri Üssü Sonu © 2026</p>
    </div>

    <script>
        // Matrix Arka Plan Efekti
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const alphabet = "0101XYZV44"; const fontSize = 14;
        const columns = canvas.width / fontSize;
        const rainDrops = Array(Math.floor(columns)).fill(1);
        setInterval(() => {
            ctx.fillStyle = 'rgba(2, 2, 2, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff33'; ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            }
        }, 30);

        // Güvenli Buton Tıklama Fonksiyonu (Simülasyon Uyarıları)
        function inceleGörsel(id) {
            alert("İnceleme Talebi Alındı!\nBağlantı ID: " + id + "\nDurum: Simüle edilen yerel ağda trafik izleniyor.");
        }

        // Kategori A: 20 Resim
        const katA = document.getElementById('kategori-a');
        for(let i=1; i<=20; i++) {
            let seed = i * 5;
            katA.innerHTML += `
                <div class="img-card">
                    <img src="https://picsum.photos/id/${10 + seed}/400/300" alt="Siber">
                    <div class="img-info">
                        <span style="color:#00ff33;">[YOL]:</span> local_node_${i*3}.net<br>
                        <span style="color:#888;">[TEST]:</span> Aktif Trafik Simülasyonu
                    </div>
                    <button class="action-btn" onclick="inceleGörsel('A-${i}')">Detayları İncele</button>
                </div>`;
        }

        // Kategori B: 20 Resim
        const katB = document.getElementById('kategori-b');
        for(let i=1; i<=20; i++) {
            let seed = i * 3;
            katB.innerHTML += `
                <div class="img-card">
                    <img src="https://picsum.photos/id/${100 + seed}/400/300" alt="Tech">
                    <div class="img-info">
                        <span style="color:#00ff33;">[BİLEŞEN]:</span> loop_config_${i}.io<br>
                        <span style="color:#888;">[MOD]:</span> Localhost Test
                    </div>
                    <button class="action-btn" onclick="inceleGörsel('B-${i}')">Detayları İncele</button>
                </div>`;
        }

        // Kategori C: 20 Resim
        const katC = document.getElementById('kategori-c');
        for(let i=1; i<=20; i++) {
            let seed = i * 4;
            katC.innerHTML += `
                <div class="img-card">
                    <img src="https://picsum.photos/id/${200 + seed}/400/300" alt="Code">
                    <div class="img-info">
                        <span style="color:#00ff33;">[KAYIT]:</span> test_log_v44_${i}.txt<br>
                        <span style="color:#888;">[YÜK]:</span> Standart Veri Paketi
                    </div>
                    <button class="action-btn" onclick="inceleGörsel('C-${i}')">Detayları İncele</button>
                </div>`;
        }
    </script>
</body>
</html>
